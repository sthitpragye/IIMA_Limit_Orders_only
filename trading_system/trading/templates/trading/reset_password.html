{% extends 'trading/base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 220px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .auth-card {
    width: 100%;
    max-width: 520px;
    text-align: center;
  }

  .auth-card h2 {
    font-size: 2rem;
    margin-bottom: 8px;
    color: var(--accent);
    text-shadow: 0 0 12px rgba(0, 255, 255, 0.5);
  }

  .auth-sub {
    color: var(--muted);
    margin-bottom: 20px;
  }

  .auth-link {
    margin-top: 16px;
    color: var(--muted);
  }

  .auth-link a {
    color: var(--accent);
    text-decoration: none;
  }

  .auth-link a:hover {
    text-decoration: underline;
  }
</style>

<div class="auth-wrap">
  <div class="card auth-card">
    <form action="{% url 'password_reset' %}" method="post">
      {% csrf_token %}
      <h2>Reset Password</h2>
      <p class="auth-sub">Change your password</p>

      <div class="form-group">
        <label for="old_password">Current Password</label>
        <input type="password" class="form-control" name="old_password" id="old_password" required>
      </div>

      <div class="form-group">
        <label for="new_password1">New Password</label>
        <input type="password" class="form-control" name="new_password1" id="new_password1" required>
      </div>

      <div class="form-group">
        <label for="new_password2">Confirm New Password</label>
        <input type="password" class="form-control" name="new_password2" id="new_password2" required>
      </div>

      <button type="submit" class="btn" style="width: 100%;">Change Password</button>
      <div class="auth-link">
        <p><a href="{% url 'role_router' %}">Back to Profile</a></p>
      </div>
    </form>
  </div>
</div>
{% endblock %}
